<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mosaic — Your Streaming Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #eeede9;
  --surface3: #e6e5e0;
  --text: #1a1917;
  --muted: #7a786f;
  --border: rgba(26,25,23,0.09);
  --radius: 18px;
  --shadow: 0 2px 12px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.05);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.13), 0 2px 8px rgba(0,0,0,0.06);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  mix-blend-mode: multiply;
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px; height: 62px;
  background: rgba(245,244,240,0.88);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
}
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 21px; font-style: italic;
  color: var(--text);
}
.logo sup {
  font-family: 'Outfit', sans-serif; font-style: normal;
  font-size: 9px; font-weight: 600; color: var(--muted);
  letter-spacing: 0.8px; vertical-align: super; margin-left: 4px;
}
.header-right { display: flex; align-items: center; gap: 10px; }
.clock { font-size: 13px; font-weight: 500; color: var(--muted); }
.icon-btn {
  width: 34px; height: 34px; border-radius: 10px;
  background: var(--surface); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 15px; box-shadow: var(--shadow);
  transition: all 0.18s; user-select: none;
}
.icon-btn:hover { background: var(--surface2); transform: translateY(-1px); }

/* ── MAIN ── */
main { max-width: 1180px; margin: 0 auto; padding: 40px 48px 80px; }

/* ── GREETING ── */
.greeting { margin-bottom: 44px; animation: fadeUp 0.45s ease both; }
.greeting-date { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 5px; }
.greeting-text {
  font-family: 'Playfair Display', serif;
  font-size: clamp(24px, 3.5vw, 36px); font-weight: 400; line-height: 1.2;
}
.greeting-text em { font-style: italic; color: var(--muted); }

/* ── SECTION ── */
.section { margin-bottom: 50px; animation: fadeUp 0.45s ease both; }
.section:nth-child(2) { animation-delay: 0.07s; }
.section:nth-child(3) { animation-delay: 0.14s; }
.section:nth-child(4) { animation-delay: 0.21s; }
.section-label {
  font-size: 11px; font-weight: 600; letter-spacing: 1.1px;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.sec-btn {
  font-family: 'Outfit', sans-serif;
  font-size: 11px; font-weight: 500; letter-spacing: 0;
  text-transform: none; color: var(--muted);
  background: none; border: none; cursor: pointer;
  transition: color 0.15s; padding: 0;
}
.sec-btn:hover { color: var(--text); }

/* ── PLATFORM TILES ── */
.platform-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
}
.platform-tile {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 18px 20px;
  cursor: pointer;
  transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: var(--shadow);
  display: flex; flex-direction: column; align-items: flex-start; gap: 14px;
  position: relative; overflow: hidden;
  text-decoration: none; color: inherit;
  user-select: none;
}
.platform-tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--tc, #ccc); opacity: 0; transition: opacity 0.2s;
}
.platform-tile:hover::before { opacity: 1; }
.platform-tile:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: var(--shadow-lg); border-color: rgba(26,25,23,0.13);
}
.platform-tile:active { transform: translateY(-2px) scale(1.0); }
.tile-icon {
  width: 46px; height: 46px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; background: var(--tic, var(--surface2)); flex-shrink: 0;
}
.tile-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.2; }
.tile-host { font-size: 11px; color: var(--muted); margin-top: 2px; }
.tile-arrow {
  position: absolute; bottom: 16px; right: 16px;
  font-size: 11px; color: var(--muted);
  opacity: 0; transition: all 0.18s; transform: translateX(-4px);
}
.platform-tile:hover .tile-arrow { opacity: 1; transform: translateX(0); }
.add-tile {
  border-style: dashed; background: transparent; box-shadow: none;
}
.add-tile:hover { background: var(--surface); box-shadow: var(--shadow); }
.add-tile .tile-icon { background: var(--surface2); font-size: 18px; }
.add-tile .tile-name { color: var(--muted); }

/* ── WATCH CARDS ── */
.watching-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 12px;
}
.watch-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px; display: flex; align-items: center; gap: 14px;
  box-shadow: var(--shadow); cursor: pointer;
  transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative; overflow: hidden;
}
.watch-card::after {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--cc, var(--surface3));
}
.watch-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.watch-thumb {
  width: 48px; height: 48px; border-radius: 12px;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0; overflow: hidden;
}
.watch-info { flex: 1; min-width: 0; }
.watch-title {
  font-size: 14px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 2px;
}
.watch-plat { font-size: 12px; color: var(--muted); }
.watch-where { font-size: 11px; color: var(--muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.play-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--text); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--bg); font-size: 12px; padding-left: 2px;
  flex-shrink: 0; transition: all 0.18s;
}
.play-btn:hover { transform: scale(1.12); background: #333; }
.add-watch-card {
  border-style: dashed; background: transparent; box-shadow: none;
  flex-direction: column; justify-content: center;
  gap: 5px; text-align: center; color: var(--muted);
  font-size: 13px; font-weight: 500; min-height: 86px;
  cursor: pointer;
}
.add-watch-card::after { display: none; }
.add-watch-card:hover { background: var(--surface); box-shadow: var(--shadow); }
.add-watch-card .plus { font-size: 20px; }

/* ── QUICK LINKS ── */
.links-row {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.link-chip {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 100px; padding: 9px 18px;
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 500; color: var(--text);
  text-decoration: none; box-shadow: var(--shadow);
  transition: all 0.18s; white-space: nowrap; position: relative;
}
.link-chip:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.link-chip .del {
  margin-left: 2px; color: var(--muted); font-size: 11px;
  opacity: 0; transition: opacity 0.15s;
  background: none; border: none; cursor: pointer; padding: 0; line-height: 1;
}
.link-chip:hover .del { opacity: 1; }
.add-chip {
  background: transparent; border-style: dashed; color: var(--muted); cursor: pointer; box-shadow: none;
}
.add-chip:hover { background: var(--surface); box-shadow: var(--shadow); }

/* ── MODAL ── */
.backdrop {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(245,244,240,0.65);
  backdrop-filter: blur(18px) saturate(180%);
  -webkit-backdrop-filter: blur(18px) saturate(180%);
  display: flex; align-items: center; justify-content: center; padding: 20px;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.backdrop.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 24px; padding: 30px; width: 100%; max-width: 420px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.14), 0 4px 16px rgba(0,0,0,0.07);
  transform: translateY(14px) scale(0.97);
  transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
  max-height: 90vh; overflow-y: auto;
}
.backdrop.open .modal { transform: translateY(0) scale(1); }
.modal-head {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px;
}
.modal-title { font-family: 'Playfair Display', serif; font-size: 19px; font-style: italic; }
.modal-close {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  font-size: 12px; cursor: pointer; color: var(--muted);
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.modal-close:hover { color: var(--text); }
.form-stack { display: flex; flex-direction: column; gap: 14px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 10px; font-weight: 700; letter-spacing: 0.9px; text-transform: uppercase; color: var(--muted); }
.field input, .field select, .field textarea {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text);
  font-family: 'Outfit', sans-serif; font-size: 14px;
  padding: 10px 13px; outline: none; width: 100%;
  transition: border-color 0.18s, background 0.18s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: rgba(26,25,23,0.4); background: var(--surface);
}
.field select option { background: var(--surface); }
.field-hint { font-size: 11px; color: var(--muted); }

.emoji-row {
  display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px;
}
.eb {
  aspect-ratio: 1; border-radius: 8px; background: var(--surface2);
  border: 1.5px solid transparent; font-size: 17px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.12s;
}
.eb:hover { background: var(--surface3); }
.eb.sel { border-color: var(--text); background: var(--surface); }

.color-row { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 2px; }
.cb {
  width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: all 0.15s;
}
.cb.sel { border-color: var(--text); box-shadow: 0 0 0 2px white, 0 0 0 4px var(--cval); }

.btn-primary {
  width: 100%; padding: 11px; background: var(--text); color: var(--bg);
  border: none; border-radius: 12px; font-family: 'Outfit', sans-serif;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.18s;
}
.btn-primary:hover { background: #2a2a27; transform: translateY(-1px); }
.btn-danger {
  width: 100%; padding: 9px; background: transparent; color: #c0392b;
  border: 1px solid rgba(192,57,43,0.22); border-radius: 10px;
  font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
}
.btn-danger:hover { background: rgba(192,57,43,0.06); border-color: #c0392b; }

/* ── CTX MENU ── */
.ctx {
  position: fixed; z-index: 300;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 5px;
  box-shadow: var(--shadow-lg); min-width: 148px; display: none;
}
.ctx.open { display: block; }
.ctx-item {
  padding: 8px 13px; border-radius: 8px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: background 0.12s; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.ctx-item:hover { background: var(--surface2); }
.ctx-item.red { color: #c0392b; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 26px; left: 50%;
  transform: translateX(-50%) translateY(56px); z-index: 400;
  background: var(--text); color: var(--bg);
  border-radius: 100px; padding: 9px 22px;
  font-size: 13px; font-weight: 500;
  transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
  white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@media (max-width: 620px) {
  header { padding: 0 18px; }
  main { padding: 26px 18px 60px; }
  .platform-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
  .watching-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="logo">Mosaic <sup>YOUR STREAMS</sup></div>
  <div class="header-right">
    <span class="clock" id="clock"></span>
    <div class="icon-btn" onclick="openSettings()" title="Settings">⚙</div>
  </div>
</header>

<main>
  <div class="greeting">
    <div class="greeting-date" id="gDate"></div>
    <div class="greeting-text" id="gText">Good evening — <em>what's on tonight?</em></div>
  </div>

  <section class="section">
    <div class="section-label">
      Continue Watching
      <button class="sec-btn" onclick="openAddWatch()">+ Add</button>
    </div>
    <div class="watching-row" id="watchRow"></div>
  </section>

  <section class="section">
    <div class="section-label">
      Your Platforms
      <button class="sec-btn" onclick="openAddPlatform()">+ Add</button>
    </div>
    <div class="platform-grid" id="platGrid"></div>
  </section>

  <section class="section">
    <div class="section-label">
      Quick Links
      <button class="sec-btn" onclick="openAddLink()">+ Add</button>
    </div>
    <div class="links-row" id="linksRow"></div>
  </section>
</main>

<!-- WATCH MODAL -->
<div class="backdrop" id="bdWatch" onclick="bdClick(event,'bdWatch')">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="wtTitle">Add to Watching</div>
      <button class="modal-close" onclick="close('bdWatch')">✕</button>
    </div>
    <div class="form-stack">
      <input type="hidden" id="wId"/>
      <div class="field"><label>Title</label><input id="wName" placeholder="e.g. Mirzapur"/></div>
      <div class="field"><label>Platform</label><select id="wPlat"></select></div>
      <div class="field">
        <label>Where you stopped <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input id="wWhere" placeholder="e.g. S2 E5 · 28 min in"/>
        <div class="field-hint">Just a reminder — the platform itself remembers your position.</div>
      </div>
      <div class="field"><label>Icon</label><div class="emoji-row" id="wEmoji"></div></div>
      <button class="btn-primary" onclick="saveWatch()">Save</button>
      <button class="btn-danger" id="wDel" onclick="delWatch()" style="display:none">Remove</button>
    </div>
  </div>
</div>

<!-- PLATFORM MODAL -->
<div class="backdrop" id="bdPlat" onclick="bdClick(event,'bdPlat')">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="ptTitle">Add Platform</div>
      <button class="modal-close" onclick="close('bdPlat')">✕</button>
    </div>
    <div class="form-stack">
      <input type="hidden" id="pId"/>
      <div class="field"><label>Name</label><input id="pName" placeholder="e.g. Mubi, Apple TV+"/></div>
      <div class="field"><label>URL</label><input id="pUrl" type="url" placeholder="https://..."/></div>
      <div class="field"><label>Icon</label><div class="emoji-row" id="pEmoji"></div></div>
      <div class="field"><label>Color</label><div class="color-row" id="colorRow"></div></div>
      <button class="btn-primary" onclick="savePlat()">Save</button>
      <button class="btn-danger" id="pDel" onclick="delPlat()" style="display:none">Remove</button>
    </div>
  </div>
</div>

<!-- LINK MODAL -->
<div class="backdrop" id="bdLink" onclick="bdClick(event,'bdLink')">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Quick Link</div>
      <button class="modal-close" onclick="close('bdLink')">✕</button>
    </div>
    <div class="form-stack">
      <div class="field"><label>Label</label><input id="lLabel" placeholder="e.g. Live Sports"/></div>
      <div class="field"><label>URL</label><input id="lUrl" type="url" placeholder="https://..."/></div>
      <div class="field"><label>Icon</label><div class="emoji-row" id="lEmoji"></div></div>
      <button class="btn-primary" onclick="saveLink()">Save</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="backdrop" id="bdSettings" onclick="bdClick(event,'bdSettings')">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Settings</div>
      <button class="modal-close" onclick="close('bdSettings')">✕</button>
    </div>
    <div class="form-stack">
      <div class="field"><label>Your Name (for greeting)</label><input id="sName" placeholder="e.g. Arjun"/></div>
      <button class="btn-primary" onclick="saveSettings()">Save</button>
      <button class="btn-danger" onclick="if(confirm('Reset all data?')){localStorage.clear();location.reload();}">Reset Everything</button>
    </div>
  </div>
</div>

<!-- CTX MENU -->
<div class="ctx" id="ctx">
  <div class="ctx-item" onclick="ctxDo('edit')">✏️ Edit</div>
  <div class="ctx-item red" onclick="ctxDo('del')">🗑 Remove</div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY = 'mosaic2';
const EMOJIS = ['🎬','📺','🎭','🎥','🍿','🎞','🎦','🎮','🏏','⚽','🎵','📚','🌍','🦸','🧪','🔮','🐉','🌙','⭐','🔥','💥','🎯','🚀','🎪'];
const COLORS = ['#ef4444','#f97316','#f59e0b','#22c55e','#14b8a6','#3b82f6','#8b5cf6','#ec4899','#64748b','#1a1917'];

let S = { name:'', platforms:[], watching:[], links:[] };
let selEmoji = {};
let selColor = COLORS[5];
let ctxT = null;

function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function host(u) { try { return new URL(u).hostname.replace('www.',''); } catch { return u; } }
function hex2rgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}

function load() {
  try { const d=JSON.parse(localStorage.getItem(KEY)); if(d){S=d;return;} } catch {}
  S = {
    name: '',
    platforms: [
      { id:'p1', name:'JioCinema',   url:'https://www.jiocinema.com',   emoji:'⭐', color:'#7c3aed' },
      { id:'p2', name:'Prime Video', url:'https://www.primevideo.com',  emoji:'📦', color:'#00a8e0' },
      { id:'p3', name:'Hotstar',     url:'https://www.hotstar.com',     emoji:'🏟', color:'#1d74f5' },
      { id:'p4', name:'YouTube',     url:'https://www.youtube.com',     emoji:'▶️', color:'#ff0000' },
      { id:'p5', name:'ZEE5',        url:'https://www.zee5.com',        emoji:'🟣', color:'#8b2fc9' },
    ],
    watching: [],
    links: [
      { id:'l1', emoji:'⚽', label:'Live Sports', url:'https://www.jiocinema.com/sports' },
      { id:'l2', emoji:'📺', label:'Live TV',     url:'https://www.jiocinema.com/live-tv' },
    ]
  };
  save();
}
function save() { localStorage.setItem(KEY, JSON.stringify(S)); }

/* ── CLOCK ── */
function tick() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  const h = now.getHours();
  const greet = h<12?'Good morning':h<17?'Good afternoon':h<21?'Good evening':'Good night';
  const tag = h<12?'ready for a binge?':h<17?'catching up on anything?':h<21?'what\'s on tonight?':'one more episode?';
  const name = S.name ? `, <em>${esc(S.name)}</em>` : '';
  document.getElementById('gDate').textContent = now.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'}).toUpperCase();
  document.getElementById('gText').innerHTML = `${greet}${name} — <em>${tag}</em>`;
}

/* ── RENDER ── */
function render() { renderWatch(); renderPlats(); renderLinks(); }

function renderPlats() {
  document.getElementById('platGrid').innerHTML = S.platforms.map(p=>`
    <a class="platform-tile" href="${esc(p.url)}" target="_blank" rel="noopener"
       style="--tc:${p.color};--tic:${hex2rgba(p.color,0.12)}"
       oncontextmenu="showCtx(event,'plat','${p.id}')">
      <div class="tile-icon">${p.emoji}</div>
      <div><div class="tile-name">${esc(p.name)}</div><div class="tile-host">${host(p.url)}</div></div>
      <div class="tile-arrow">↗</div>
    </a>`).join('')+`
    <div class="platform-tile add-tile" onclick="openAddPlatform()">
      <div class="tile-icon">＋</div>
      <div><div class="tile-name">Add Platform</div><div class="tile-host">Any site</div></div>
    </div>`;
}

function renderWatch() {
  const row = document.getElementById('watchRow');
  const cards = S.watching.map(w=>{
    const p = S.platforms.find(x=>x.id===w.platId);
    const c = p?.color||'#64748b';
    return `<div class="watch-card" style="--cc:${c}" oncontextmenu="showCtx(event,'watch','${w.id}')">
      <div class="watch-thumb">${w.emoji||'🎬'}</div>
      <div class="watch-info">
        <div class="watch-title">${esc(w.name)}</div>
        <div class="watch-plat">${esc(p?.name||w.platName||'')}</div>
        ${w.where?`<div class="watch-where">📍 ${esc(w.where)}</div>`:''}
      </div>
      <button class="play-btn" onclick="goWatch(event,'${w.id}')" title="Open platform">▶</button>
    </div>`;
  }).join('');
  row.innerHTML = cards + `<div class="watch-card add-watch-card" onclick="openAddWatch()"><div class="plus">＋</div><div>${S.watching.length?'Add another':'Pin what you\'re watching'}</div></div>`;
}

function renderLinks() {
  const row = document.getElementById('linksRow');
  row.innerHTML = S.links.map(l=>`
    <a class="link-chip" href="${esc(l.url)}" target="_blank" rel="noopener" oncontextmenu="showCtx(event,'link','${l.id}')">
      <span>${l.emoji}</span>${esc(l.label)}
      <button class="del" onclick="delLink(event,'${l.id}')" title="Remove">✕</button>
    </a>`).join('')+`
    <div class="link-chip add-chip" onclick="openAddLink()"><span>＋</span> Add link</div>`;
}

function goWatch(e, id) {
  e.stopPropagation();
  const w = S.watching.find(x=>x.id===id);
  const p = S.platforms.find(x=>x.id===w?.platId);
  if(p?.url) window.open(p.url,'_blank');
}

/* ── EMOJI / COLOR PICKERS ── */
function buildEmoji(containerId, def) {
  selEmoji[containerId] = def||EMOJIS[0];
  document.getElementById(containerId).innerHTML = EMOJIS.map(e=>
    `<div class="eb${e===selEmoji[containerId]?' sel':''}" onclick="pickEmoji('${containerId}','${e}',this)">${e}</div>`
  ).join('');
}
function pickEmoji(gid,e,el) {
  selEmoji[gid]=e;
  document.querySelectorAll(`#${gid} .eb`).forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
}
function buildColors(sel) {
  selColor = sel||COLORS[5];
  document.getElementById('colorRow').innerHTML = COLORS.map(c=>
    `<div class="cb${c===selColor?' sel':''}" style="background:${c};--cval:${c}" onclick="pickColor('${c}',this)"></div>`
  ).join('');
}
function pickColor(c,el) {
  selColor=c;
  document.querySelectorAll('.cb').forEach(b=>{b.classList.remove('sel');b.style.boxShadow='none';b.style.borderColor='transparent';});
  el.classList.add('sel'); el.style.boxShadow=`0 0 0 2px white,0 0 0 4px ${c}`; el.style.borderColor='var(--text)';
}

/* ── WATCH MODAL ── */
function openAddWatch() {
  document.getElementById('wId').value='';
  document.getElementById('wName').value='';
  document.getElementById('wWhere').value='';
  document.getElementById('wDel').style.display='none';
  document.getElementById('wtTitle').textContent='Add to Watching';
  document.getElementById('wPlat').innerHTML=S.platforms.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  buildEmoji('wEmoji','🎬');
  open('bdWatch');
}
function openEditWatch(id) {
  const w=S.watching.find(x=>x.id===id); if(!w)return;
  document.getElementById('wId').value=id;
  document.getElementById('wName').value=w.name;
  document.getElementById('wWhere').value=w.where||'';
  document.getElementById('wDel').style.display='block';
  document.getElementById('wtTitle').textContent='Edit';
  document.getElementById('wPlat').innerHTML=S.platforms.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  document.getElementById('wPlat').value=w.platId;
  buildEmoji('wEmoji',w.emoji);
  open('bdWatch');
}
function saveWatch() {
  const name=document.getElementById('wName').value.trim(); if(!name){alert('Enter a title.');return;}
  const id=document.getElementById('wId').value;
  const platId=document.getElementById('wPlat').value;
  const plat=S.platforms.find(p=>p.id===platId);
  const entry={id:id||uid(),name,platId,platName:plat?.name||'',where:document.getElementById('wWhere').value.trim(),emoji:selEmoji['wEmoji']||'🎬'};
  if(id){const i=S.watching.findIndex(x=>x.id===id);if(i!==-1)S.watching[i]=entry;}
  else S.watching.unshift(entry);
  save();close('bdWatch');render();toast(id?'Updated!':'Added "'+name+'"');
}
function delWatch() {
  const id=document.getElementById('wId').value;
  S.watching=S.watching.filter(x=>x.id!==id);
  save();close('bdWatch');render();toast('Removed');
}

/* ── PLATFORM MODAL ── */
function openAddPlatform() {
  document.getElementById('pId').value='';
  document.getElementById('pName').value='';
  document.getElementById('pUrl').value='';
  document.getElementById('pDel').style.display='none';
  document.getElementById('ptTitle').textContent='Add Platform';
  buildEmoji('pEmoji','🌐');
  buildColors();
  open('bdPlat');
}
function openEditPlatform(id) {
  const p=S.platforms.find(x=>x.id===id);if(!p)return;
  document.getElementById('pId').value=id;
  document.getElementById('pName').value=p.name;
  document.getElementById('pUrl').value=p.url;
  document.getElementById('pDel').style.display='block';
  document.getElementById('ptTitle').textContent='Edit Platform';
  buildEmoji('pEmoji',p.emoji);
  buildColors(p.color);
  open('bdPlat');
}
function savePlat() {
  const name=document.getElementById('pName').value.trim();
  const url=document.getElementById('pUrl').value.trim();
  if(!name||!url){alert('Name and URL required.');return;}
  const id=document.getElementById('pId').value;
  const entry={id:id||uid(),name,url,emoji:selEmoji['pEmoji']||'🌐',color:selColor};
  if(id){const i=S.platforms.findIndex(x=>x.id===id);if(i!==-1)S.platforms[i]=entry;}
  else S.platforms.push(entry);
  save();close('bdPlat');render();toast(id?'Updated!':'Added '+name);
}
function delPlat() {
  const id=document.getElementById('pId').value;
  if(!confirm('Remove this platform?'))return;
  S.platforms=S.platforms.filter(x=>x.id!==id);
  S.watching=S.watching.filter(x=>x.platId!==id);
  save();close('bdPlat');render();toast('Removed');
}

/* ── LINK MODAL ── */
function openAddLink() {
  document.getElementById('lLabel').value='';
  document.getElementById('lUrl').value='';
  buildEmoji('lEmoji','🔗');
  open('bdLink');
}
function saveLink() {
  const label=document.getElementById('lLabel').value.trim();
  const url=document.getElementById('lUrl').value.trim();
  if(!label||!url){alert('Label and URL required.');return;}
  S.links.push({id:uid(),label,url,emoji:selEmoji['lEmoji']||'🔗'});
  save();close('bdLink');render();toast('Added "'+label+'"');
}
function delLink(e,id) {
  e.preventDefault();e.stopPropagation();
  S.links=S.links.filter(x=>x.id!==id);
  save();render();toast('Removed');
}

/* ── SETTINGS ── */
function openSettings() { document.getElementById('sName').value=S.name||''; open('bdSettings'); }
function saveSettings() { S.name=document.getElementById('sName').value.trim(); save();close('bdSettings');tick();toast('Saved!'); }

/* ── CTX ── */
function showCtx(e,type,id) {
  e.preventDefault(); ctxT={type,id};
  const m=document.getElementById('ctx');
  m.style.left=e.clientX+'px'; m.style.top=e.clientY+'px'; m.classList.add('open');
}
function ctxDo(action) {
  document.getElementById('ctx').classList.remove('open');
  if(!ctxT)return;
  const{type,id}=ctxT;
  if(action==='edit'){
    if(type==='plat') openEditPlatform(id);
    else if(type==='watch') openEditWatch(id);
  } else {
    if(type==='plat'){if(confirm('Remove platform?')){S.platforms=S.platforms.filter(x=>x.id!==id);S.watching=S.watching.filter(x=>x.platId!==id);save();render();toast('Removed');}}
    else if(type==='watch'){S.watching=S.watching.filter(x=>x.id!==id);save();render();toast('Removed');}
    else if(type==='link'){S.links=S.links.filter(x=>x.id!==id);save();render();toast('Removed');}
  }
}
document.addEventListener('click',()=>document.getElementById('ctx').classList.remove('open'));
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeAll();});

/* ── MODAL UTILS ── */
function open(id){document.getElementById(id).classList.add('open');}
function close(id){document.getElementById(id).classList.remove('open');}
function closeAll(){document.querySelectorAll('.backdrop').forEach(b=>b.classList.remove('open'));}
function bdClick(e,id){if(e.target.id===id)close(id);}

/* ── TOAST ── */
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

/* ── INIT ── */
load(); tick(); setInterval(tick,30000); render();
</script>
</body>
</html>
