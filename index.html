<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mosaic — Indian Stream Center</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0c10;
  --card-bg: rgba(255, 255, 255, 0.06);
  --glass: rgba(20, 22, 26, 0.7);
  --accent: #0071e3;
  --text: #ffffff;
  --text-muted: #9ca3af;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

body {
  font-family: 'Outfit', sans-serif;
  background: radial-gradient(circle at top right, #1a1c24, #0a0c10);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
  padding: 40px 5%;
}

/* ── LAYOUT ── */
header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
.logo { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
.logo span { color: var(--accent); }

h2 { font-size: 22px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

/* ── OTT CHANNELS ── */
.ott-row { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
.ott-card {
  flex: 0 0 140px; height: 80px; background: var(--card-bg);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px);
  text-decoration: none; color: inherit; position: relative;
}
.ott-card:hover { transform: translateY(-5px); border-color: var(--accent); background: rgba(255,255,255,0.1); }
.ott-card b { font-size: 14px; }
.ott-del { position: absolute; top: 5px; right: 8px; font-size: 12px; opacity: 0; transition: 0.2s; color: #ff4d4d; }
.ott-card:hover .ott-del { opacity: 1; }

/* ── MOVIE GRID ── */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
.movie-card {
  background: var(--card-bg); border-radius: 24px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08); transition: 0.4s cubic-bezier(0.2, 1, 0.2, 1);
  cursor: pointer; position: relative;
}
.movie-card:hover { transform: scale(1.02) translateY(-5px); border-color: rgba(255,255,255,0.3); }

/* The Generated "Poster" */
.poster { height: 180px; width: 100%; display: flex; align-items: center; justify-content: center; font-size: 40px; position: relative; }
.poster-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); }

.card-body { padding: 20px; position: relative; }
.movie-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.movie-meta { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 10px; }
.tag { background: var(--accent); color: white; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }

/* ── MODALS ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
  opacity: 0; pointer-events: none; transition: 0.3s;
}
.modal-overlay.active { opacity: 1; pointer-events: all; }
.modal { background: #1c1c1e; width: 90%; max-width: 400px; padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
input { width: 100%; background: #2c2c2e; border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; color: white; margin-bottom: 15px; font-family: inherit; }
.btn-primary { width: 100%; padding: 15px; background: white; color: black; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; }
.btn-ghost { width: 100%; padding: 10px; background: transparent; color: var(--text-muted); border: none; cursor: pointer; margin-top: 10px; }

/* ── ADD BUTTONS ── */
.add-btn-circle { width: 40px; height: 40px; border-radius: 50%; background: white; color: black; border: none; font-size: 20px; cursor: pointer; }

</style>
</head>
<body>

<header>
  <div class="logo">MOSAIC<span>.</span></div>
  <button class="add-btn-circle" onclick="openModal('movieModal')">+</button>
</header>

<section style="margin-bottom: 40px;">
  <h2>Platforms <button class="add-btn-circle" style="width:25px; height:25px; font-size:14px;" onclick="openModal('ottModal')">+</button></h2>
  <div class="ott-row" id="ottRow"></div>
</section>

<section>
  <h2>Up Next</h2>
  <div class="grid" id="movieGrid"></div>
</section>

<div class="modal-overlay" id="movieModal">
  <div class="modal">
    <h3 style="margin-bottom:20px">Add to Watchlist</h3>
    <input type="text" id="mLink" placeholder="Paste Netflix/OTT link..." oninput="parseTitle(this.value)">
    <input type="text" id="mTitle" placeholder="Movie or Show Name">
    <input type="text" id="mNote" placeholder="Episode (e.g. S1 E5)">
    <button class="btn-primary" onclick="addMovie()">Add to Shelf</button>
    <button class="btn-ghost" onclick="closeModals()">Cancel</button>
  </div>
</div>

<div class="modal-overlay" id="ottModal">
  <div class="modal">
    <h3 style="margin-bottom:20px">Add OTT Platform</h3>
    <input type="text" id="oName" placeholder="Platform Name (e.g. Mubi)">
    <input type="text" id="oUrl" placeholder="Website URL (https://...)">
    <button class="btn-primary" onclick="addOTT()">Save Platform</button>
    <button class="btn-ghost" onclick="closeModals()">Cancel</button>
  </div>
</div>

<script>
// Initial Indian OTT Setup
const defaultOTTs = [
    { name: 'JioCinema', url: 'https://www.jiocinema.com' },
    { name: 'Hotstar', url: 'https://www.hotstar.com' },
    { name: 'Netflix', url: 'https://www.netflix.com' },
    { name: 'Prime Video', url: 'https://www.primevideo.com' },
    { name: 'SonyLIV', url: 'https://www.sonyliv.com' },
    { name: 'ZEE5', url: 'https://www.zee5.com' }
];

let otts = JSON.parse(localStorage.getItem('mosaic_otts')) || defaultOTTs;
let movies = JSON.parse(localStorage.getItem('mosaic_movies')) || [];

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }

function addOTT() {
    const name = document.getElementById('oName').value;
    const url = document.getElementById('oUrl').value;
    if(!name || !url) return;
    otts.push({ name, url });
    save(); render(); closeModals();
}

function removeOTT(index, e) {
    e.stopPropagation(); e.preventDefault();
    otts.splice(index, 1);
    save(); render();
}

function parseTitle(url) {
    try {
        const path = new URL(url).pathname;
        const slug = path.split('/').filter(p => p.length > 3 && isNaN(p)).pop();
        if(slug) {
            const clean = slug.replace(/-/g, ' ');
            document.getElementById('mTitle').value = clean.charAt(0).toUpperCase() + clean.slice(1);
        }
    } catch(e) {}
}

function addMovie() {
    const title = document.getElementById('mTitle').value;
    const link = document.getElementById('mLink').value;
    const note = document.getElementById('mNote').value;
    if(!title || !link) return;

    movies.unshift({ id: Date.now(), title, link, note, platform: getDomain(link) });
    save(); render(); closeModals();
    document.getElementById('mTitle').value = ''; document.getElementById('mLink').value = '';
}

function deleteMovie(id, e) {
    e.stopPropagation();
    movies = movies.filter(m => m.id !== id);
    save(); render();
}

function getDomain(url) {
    try { return new URL(url).hostname.replace('www.','').split('.')[0].toUpperCase(); } 
    catch(e) { return 'LINK'; }
}

function generateGradient(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
    const h1 = Math.abs(hash % 360);
    const h2 = (h1 + 40) % 360;
    return `linear-gradient(135deg, hsl(${h1}, 70%, 40%), hsl(${h2}, 80%, 20%))`;
}

function save() {
    localStorage.setItem('mosaic_otts', JSON.stringify(otts));
    localStorage.setItem('mosaic_movies', JSON.stringify(movies));
}

function render() {
    const ottRow = document.getElementById('ottRow');
    ottRow.innerHTML = otts.map((o, i) => `
        <a href="${o.url}" target="_blank" class="ott-card">
            <span class="ott-del" onclick="removeOTT(${i}, event)">✕</span>
            <b>${o.name}</b>
        </a>
    `).join('');

    const movieGrid = document.getElementById('movieGrid');
    movieGrid.innerHTML = movies.map(m => `
        <div class="movie-card" onclick="window.open('${m.link}', '_blank')">
            <div class="poster" style="background: ${generateGradient(m.title)}">
                ${m.title.charAt(0)}
                <div class="poster-overlay"></div>
            </div>
            <div class="card-body">
                <div class="movie-title">${m.title}</div>
                <div class="movie-meta">
                    <span class="tag">${m.platform}</span>
                    <span>${m.note || 'Continue'}</span>
                </div>
                <div onclick="deleteMovie(${m.id}, event)" style="position:absolute; top:20px; right:20px; color:rgba(255,255,255,0.2)">✕</div>
            </div>
        </div>
    `).join('');
}

render();
</script>
</body>
</html>
