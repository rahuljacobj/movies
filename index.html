<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mosaic — Stream Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --apple-bg: #000000;
  --apple-glass: rgba(25, 25, 25, 0.7);
  --apple-text: #ffffff;
  --apple-muted: #86868b;
  --apple-accent: #0071e3;
  --radius-lg: 22px;
  --radius-sm: 12px;
  --blur: 25px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

body {
  font-family: 'Outfit', -apple-system, sans-serif;
  background-color: var(--apple-bg);
  background-image: radial-gradient(circle at 0% 0%, #1a1a1a 0%, #000000 100%);
  color: var(--apple-text);
  min-height: 100vh;
  padding-bottom: 100px;
}

/* ── HEADER ── */
header {
  padding: 40px 60px 20px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.brand { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.brand span { color: var(--apple-muted); font-weight: 400; }

/* ── SHELF ── */
.shelf { padding: 0 60px; margin-top: 40px; }
.shelf-title {
  font-size: 22px; font-weight: 600; margin-bottom: 20px;
  display: flex; justify-content: space-between; align-items: center;
}
.add-btn {
  background: var(--apple-glass); border: 1px solid rgba(255,255,255,0.1);
  color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px;
  cursor: pointer; transition: 0.2s; backdrop-filter: blur(10px);
}
.add-btn:hover { background: rgba(255,255,255,0.15); transform: scale(1.05); }

/* ── CARDS ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}
.card {
  position: relative;
  background: var(--apple-glass);
  border-radius: var(--radius-lg);
  overflow: hidden;
  aspect-ratio: 16 / 9;
  border: 1px solid rgba(255,255,255,0.08);
  transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  cursor: pointer;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 20px;
  backdrop-filter: blur(var(--blur));
}
.card:hover {
  transform: scale(1.03);
  border-color: rgba(255,255,255,0.3);
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}
.card-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 60%);
  z-index: 1;
}
.card-content { position: relative; z-index: 2; }
.card-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.card-meta { font-size: 13px; color: var(--apple-muted); display: flex; align-items: center; gap: 8px; }
.card-tag { 
    background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px; 
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
}

.play-trigger {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 50px; height: 50px; background: #fff; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: 0.3s; z-index: 3;
}
.card:hover .play-trigger { opacity: 1; }
.play-trigger svg { fill: #000; width: 20px; margin-left: 3px; }

/* ── PLATFORM CHIPS ── */
.platform-row { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
.platform-chip {
    background: var(--apple-glass); border: 1px solid rgba(255,255,255,0.1);
    padding: 12px 24px; border-radius: 50px; backdrop-filter: blur(10px);
    display: flex; align-items: center; gap: 10px; text-decoration: none;
    color: #fff; font-weight: 500; transition: 0.2s;
}
.platform-chip:hover { border-color: #fff; transform: translateY(-2px); }

/* ── MODAL ── */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  backdrop-filter: blur(15px); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: 0.3s;
}
.modal-bg.active { opacity: 1; pointer-events: all; }
.modal {
  background: #1c1c1e; width: 90%; max-width: 450px;
  border-radius: 28px; padding: 32px; border: 1px solid rgba(255,255,255,0.1);
}
.modal h2 { margin-bottom: 24px; font-weight: 600; }
.input-group { margin-bottom: 20px; }
.input-group label { display: block; font-size: 12px; color: var(--apple-muted); margin-bottom: 8px; text-transform: uppercase; }
.input-group input, .input-group select {
  width: 100%; background: #2c2c2e; border: none; padding: 14px;
  border-radius: 12px; color: #fff; font-family: inherit; font-size: 15px;
}
.save-btn {
  width: 100%; padding: 16px; background: #fff; color: #000;
  border: none; border-radius: 14px; font-weight: 700; cursor: pointer;
  margin-top: 10px;
}

@media (max-width: 600px) {
  header, .shelf { padding: 20px; }
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="brand">Mosaic <span>Plus</span></div>
</header>

<div class="shelf">
  <div class="shelf-title">
    Up Next
    <button class="add-btn" onclick="toggleModal(true)">+ Add Show</button>
  </div>
  <div class="grid" id="watchGrid">
    </div>
</div>

<div class="shelf">
  <div class="shelf-title">Channels</div>
  <div class="platform-row" id="platRow">
    </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>Add Tracking</h2>
    <div class="input-group">
      <label>Paste Link (Netflix/Jio/etc)</label>
      <input type="text" id="mLink" placeholder="https://..." oninput="autoName(this.value)">
    </div>
    <div class="input-group">
      <label>Title</label>
      <input type="text" id="mTitle" placeholder="e.g. Stranger Things">
    </div>
    <div class="input-group">
      <label>Episode/Note</label>
      <input type="text" id="mNote" placeholder="e.g. S4 E2">
    </div>
    <button class="save-btn" onclick="saveItem()">Add to Shelf</button>
    <button class="add-btn" style="width:100%; margin-top:10px;" onclick="toggleModal(false)">Cancel</button>
  </div>
</div>

<script>
let items = JSON.parse(localStorage.getItem('mosaic_v3')) || [];

function toggleModal(show) {
    document.getElementById('modal').classList.toggle('active', show);
    if(show) document.getElementById('mLink').focus();
}

function autoName(url) {
    // Attempt to guess platform and show name from URL slugs
    try {
        const path = new URL(url).pathname;
        const parts = path.split('/').filter(p => p.length > 3 && !/^\d+$/.test(p));
        if(parts.length > 0) {
            let name = parts[parts.length-1].replace(/-/g, ' ');
            document.getElementById('mTitle').value = name.charAt(0).toUpperCase() + name.slice(1);
        }
    } catch(e) {}
}

function saveItem() {
    const link = document.getElementById('mLink').value;
    const title = document.getElementById('mTitle').value;
    const note = document.getElementById('mNote').value;
    
    if(!title || !link) return alert("Title and Link required");

    const newItem = {
        id: Date.now(),
        title,
        link,
        note,
        platform: getDomain(link)
    };

    items.unshift(newItem);
    localStorage.setItem('mosaic_v3', JSON.stringify(items));
    render();
    toggleModal(false);
    
    // Reset form
    document.getElementById('mLink').value = '';
    document.getElementById('mTitle').value = '';
    document.getElementById('mNote').value = '';
}

function getDomain(url) {
    try {
        const d = new URL(url).hostname.replace('www.','').split('.')[0];
        return d.charAt(0).toUpperCase() + d.slice(1);
    } catch(e) { return 'Link'; }
}

function deleteItem(id) {
    items = items.filter(i => i.id !== id);
    localStorage.setItem('mosaic_v3', JSON.stringify(items));
    render();
}

function render() {
    const grid = document.getElementById('watchGrid');
    grid.innerHTML = items.map(item => `
        <div class="card" onclick="window.open('${item.link}', '_blank')">
            <div class="card-overlay"></div>
            <div class="play-trigger">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <div class="card-content">
                <div class="card-title">${item.title}</div>
                <div class="card-meta">
                    <span class="card-tag">${item.platform}</span>
                    <span>${item.note || 'Ready to watch'}</span>
                </div>
            </div>
            <button onclick="event.stopPropagation(); deleteItem(${item.id})" 
                    style="position:absolute; top:15px; right:15px; background:none; border:none; color:rgba(255,255,255,0.3); cursor:pointer; z-index:10;">✕</button>
        </div>
    `).join('');

    // Render Quick Channels based on platforms added
    const platRow = document.getElementById('platRow');
    const uniquePlats = [...new Set(items.map(i => i.platform))];
    platRow.innerHTML = uniquePlats.map(p => `
        <div class="platform-chip">${p}</div>
    `).join('') + `
        <a href="https://www.netflix.com" target="_blank" class="platform-chip">Netflix</a>
        <a href="https://www.jiocinema.com" target="_blank" class="platform-chip">JioCinema</a>
        <a href="https://www.hotstar.com" target="_blank" class="platform-chip">Hotstar</a>
    `;
}

render();
</script>
</body>
</html>
